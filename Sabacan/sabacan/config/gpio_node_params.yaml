# GPIOノード用パラメータ設定ファイル
# 安定性向上のための設定

sabacan_gpio_node:
  ros__parameters:
    # 基本設定
    pin_type: ["PWM_OUT", "PWM_OUT", "PWM_IN", "PWM_IN", "PWM_OUT", "PWM_OUT", "PWM_OUT", "PWM_OUT", "PWM_OUT"]
    board_id: 0
    
    # モニタリング設定
    monitor_period_ms: 50          # CANモニタ周期（ms）
    enable_monitor_period: true    # モニタ周期の有効/無効
    
    # 安定性向上パラメータ
    gpio_monitor_timer_ms: 20      # GPIO監視タイマー周期（ms）- 20ms推奨
    max_init_retries: 3            # 初期化最大リトライ回数
    init_retry_delay_ms: 100       # 初期化リトライ間隔（ms）
